spring.application.name=backend

# Server
server.port=${PORT:8080}

# Local development properties
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Database - Neon (pooler endpoint)
spring.datasource.url=jdbc:postgresql://ep-young-sea-aqt5yjid-pooler.c-8.us-east-1.aws.neon.tech/neondb?sslmode=require&channelBinding=require
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (HikariCP - Spring Boot default)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET}
jwt.refresh-secret=${JWT_REFRESH_SECRET}
jwt.expiration=900000
jwt.refresh-expiration=604800000

# CORS
cors.allowed-origins=${CLIENT_URL}

# Cookie settings
app.cookie.secure=${COOKIE_SECURE:true}
app.cookie.same-site=${COOKIE_SAME_SITE:None}

# Email
spring.mail.host=smtp.resend.com
spring.mail.port=465
spring.mail.username=resend
spring.mail.password=${RESEND_API_KEY}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true

app.email.from=${EMAIL_FROM:noreply@auth-system-java.com}

# App URL for email links
app.base-url=${APP_BASE_URL}