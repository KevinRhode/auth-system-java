spring.application.name=portfolio-api
# Server
server.port=8080

# Database - Neon
spring.datasource.url=jdbc:postgresql://ep-young-sea-aqt5yjid-pooler.c-8.us-east-1.aws.neon.tech/neondb?sslmode=require&channelBinding=require
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT
jwt.secret=${JWT_SECRET}
jwt.refresh-secret=${JWT_REFRESH_SECRET}
jwt.expiration=900000
jwt.refresh-expiration=604800000

# CORS
cors.allowed-origins=${https://auth-system-ivory.vercel.app/}