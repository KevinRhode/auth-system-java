spring.application.name=backend

# Server
server.port=${PORT:8080}

# Local development properties
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Database - Neon (pooler endpoint)
spring.datasource.url=jdbc:postgresql://ep-young-sea-aqt5yjid-pooler.c-8.us-east-1.aws.neon.tech/neondb?sslmode=require&channelBinding=require
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (HikariCP - Spring Boot default)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT
jwt.secret=${JWT_SECRET}
jwt.refresh-secret=${JWT_REFRESH_SECRET}
jwt.expiration=900000
jwt.refresh-expiration=604800000

# CORS
cors.allowed-origins=${CLIENT_URL}