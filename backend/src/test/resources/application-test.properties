# backend/src/test/resources/application-test.properties

# Database - in-memory H2 pretending to be PostgreSQL
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA - fresh schema per test run
spring.jpa.hibernate.ddl-auto=create-drop

# JWT - dummy secrets, must be long enough for HMAC-SHA256 (256+ bits)
jwt.secret=test-access-secret-0123456789-0123456789-0123456789-0123456789
jwt.refresh-secret=test-refresh-secret-0123456789-0123456789-0123456789-0123456789

# CORS
cors.allowed-origins=http://localhost:4200

# App URLs / email
app.base-url=http://localhost:8080
resend.api-key=re_test_dummy_key